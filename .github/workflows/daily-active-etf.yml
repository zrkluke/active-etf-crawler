name: Daily Active ETF Holdings

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. These are fallback windows for
    # 21:07, 21:37, 22:11, and 22:47 Asia/Taipei (after TWSE/TPEx publish margin data ~21:00).
    - cron: "7 13 * * *"
    - cron: "37 13 * * *"
    - cron: "11 14 * * *"
    - cron: "47 14 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check out data (data branch)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Network Diagnostics
        run: |
          echo "==== Testing connection to MoneyDJ (urllib) ===="
          uv run python -c "import urllib.request; urllib.request.urlopen('https://www.moneydj.com', timeout=5)" && echo "urllib success" || echo "urllib failed"
          echo "==== Testing connection to MoneyDJ (curl) ===="
          curl -I -m 5 https://www.moneydj.com || echo "curl failed"

      - name: Fetch holdings and send notification
        run: uv run main.py --notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: active-etf-holdings-data
          path: data/

      - name: Commit updated data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): 更新主動式 ETF 持股資料" -m "更新 MoneyDJ 持股快照、比對結果與最新摘要。"
            git push origin HEAD:data
          fi
