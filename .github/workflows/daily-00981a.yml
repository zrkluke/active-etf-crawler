name: Daily 00981A Holdings

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. These are fallback windows for
    # 18:30, 19:00, 20:00, 20:30, and 21:30 Asia/Taipei.
    - cron: "30 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch holdings and send notification
        run: python moneydj_00981a_holdings.py --notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 00981a-holdings-data
          path: data/

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update 00981A holdings data"
            git push
          fi
